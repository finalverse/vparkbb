server {
    listen 80;
    listen [::]:80;
    server_name www.victoriapark.io;
    root /var/www/html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location = /php-fpm-ping {
        allow 127.0.0.1;
        deny all;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /php-fpm-ping;
        fastcgi_pass php:9000;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://www.victoriapark.io$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name victoriapark.io;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://www.victoriapark.io$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name victoriapark.io;

    ssl_certificate /etc/letsencrypt/live/www.victoriapark.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.victoriapark.io/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/www.victoriapark.io/chain.pem;

    location / {
        return 301 https://www.victoriapark.io$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.victoriapark.io;

    root /var/www/html;
    index index.php index.html;
    client_max_body_size 64m;

    ssl_certificate /etc/letsencrypt/live/www.victoriapark.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.victoriapark.io/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/www.victoriapark.io/chain.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.11 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data:; font-src 'self' https: data:; connect-src 'self' https:; frame-ancestors 'self';" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /php-fpm-ping {
        allow 127.0.0.1;
        deny all;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /php-fpm-ping;
        fastcgi_pass php:9000;
    }

    location = /php-fpm-status {
        allow 127.0.0.1;
        deny all;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /php-fpm-status;
        fastcgi_pass php:9000;
    }

    location / {
        try_files $uri $uri/ /app.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_pass php:9000;

        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(cache|files|store|vendor)/.*\.php$ {
        deny all;
    }

    location ~* \.(?:sql|twig|tpl|yaml|yml|md|sh|inc|dist)$ {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
