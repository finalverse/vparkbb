name: ${COMPOSE_PROJECT_NAME:-vparkbb}

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
    environment:
      TZ: ${TZ:-UTC}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mariadb-admin ping -h 127.0.0.1 -uroot --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  php:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    image: victoriapark/php-fpm:8.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      VPARK_PORTAL_URL: ${VPARK_PORTAL_URL:-https://victoriapark.io}
      VPARK_SSO_ALLOWED_ORIGIN: ${VPARK_SSO_ALLOWED_ORIGIN:-}
      VPARK_SUMMARY_BUTTON_ENABLED: ${VPARK_SUMMARY_BUTTON_ENABLED:-1}
    volumes:
      - ./:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/php-fpm-ping | grep -q pong"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend

  certbot:
    image: certbot/certbot:v2.11.0
    profiles: ["ops"]
    volumes:
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt

networks:
  backend:

volumes:
  db_data:
