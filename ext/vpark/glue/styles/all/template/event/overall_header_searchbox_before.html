<div class="vpark-header-center" role="navigation" aria-label="{{ VPARK_HEADER_AD_TITLE }}">
	<div class="vpark-header-forum-compact">
		{% for forum in vpark_forum_panel %}
			<a class="vpark-header-forum-compact__item" href="{{ forum.U_FORUM }}">{{ forum.TITLE }}</a>
		{% endfor %}
	</div>
</div>
<div class="vpark-header-right-ad" aria-label="{{ VPARK_HEADER_AD_TITLE }}">
	<div class="vpark-header-right-ad__title">{{ VPARK_HEADER_AD_TITLE }}</div>
	<div class="vpark-header-right-ad__desc">{{ VPARK_HEADER_AD_DESC }}</div>
</div>
