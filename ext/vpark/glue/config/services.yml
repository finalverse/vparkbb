services:
    vpark.glue.listener:
        class: vpark\glue\event\listener
        arguments:
            - '@template'
            - '@dbal.conn'
            - '@config'
            - '@user'
            - '@request'
            - '%core.root_path%'
            - '%core.php_ext%'
            - '@cache'
        tags:
            - { name: event.listener }

    vpark.glue.controller.session:
        class: vpark\glue\controller\session
        arguments:
            - '@user'
            - '@config'
            - '@request'
