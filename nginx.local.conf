server {
    listen 80;
    listen [::]:80;
    server_name localhost 127.0.0.1;

    root /var/www/html;
    index index.php index.html;
    client_max_body_size 64m;
    set $php_upstream php:9000;
    resolver 127.0.0.11 valid=300s ipv6=off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' http: https:; style-src 'self' 'unsafe-inline' http: https:; img-src 'self' http: https: data:; font-src 'self' http: https: data:; connect-src 'self' http: https:; frame-ancestors 'self';" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /php-fpm-ping {
        allow 127.0.0.1;
        deny all;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /php-fpm-ping;
        fastcgi_pass $php_upstream;
    }

    location = /php-fpm-status {
        allow 127.0.0.1;
        deny all;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /php-fpm-status;
        fastcgi_pass $php_upstream;
    }

    location / {
        try_files $uri $uri/ /app.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass $php_upstream;

        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(cache|files|store|vendor)/.*\.php$ {
        deny all;
    }

    location ~* \.(?:sql|twig|tpl|yaml|yml|md|sh|inc|dist)$ {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
